.card {

}

.progress-container {
margin-bottom: 32px;
}

.progress-bar {
width: 100%;
height: 10px;
background: #d9e2ec;
border-radius: 40px;
overflow: hidden;
box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
}

.progress-fill {
height: 10px;
width: 0%;
background: linear-gradient(90deg, #2b6c9e, #4aa3d1);
border-radius: 40px;
transition: width 0.3s ease;
}

display: flex;

font-weight: 500;

.question-box {

.question {

color: #0b1e2c;
margin-bottom: 26px;

}

.options-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 14px;
}

.option-btn {
background: white;
border: 1.5px solid #cbd6e3;
border-radius: 60px;
padding: 18px 22px;
font-size: 1.1rem;
font-weight: 500;
color: #1f3a54;
text-align: left;
cursor: pointer;
transition: all 0.15s;
box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
backdrop-filter: blur(4px);
display: flex;
align-items: center;
gap: 10px;
}

.option-btn:hover {
background: #ecf3fa;
border-color: #7ba9cc;
box-shadow: 0 8px 14px -8px rgba(36, 94, 145, 0.2);
transform: translateY(-1px);
}

.option-btn.selected {
background: #1f4b72;
border-color: #1f4b72;
color: white;
box-shadow: 0 8px 16px -6px #1f4b7260;
}

.option-btn.selected .prefix {
color: #ffdb9c;
}

.prefix {
font-weight: 700;
font-size: 1.3rem;
min-width: 32px;
color: #2b6c9e;
}

.nav-buttons {
display: flex;
justify-content: space-between;
margin-top: 30px;
}

.btn {
background: white;
border: 1px solid #b6c9db;
padding: 14px 34px;
border-radius: 60px;
font-size: 1.1rem;
font-weight: 600;
color: #1f3a54;
cursor: pointer;
transition: 0.15s;
box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
backdrop-filter: blur(4px);
}

.btn-primary {
background: #1f4b72;
border: 1px solid #1f4b72;
color: white;
box-shadow: 0 10px 20px -8px #1f4b72a0;
}

.btn-primary:hover {
background: #1a3e5e;
transform: scale(0.98);
}

.btn:disabled {
opacity: 0.4;
pointer-events: none;
filter: grayscale(0.3);
}

.result-screen {
text-align: center;
padding: 20px 0 10px;
}

.result-badge {
background: #e6f0f9;
border-radius: 100px;
padding: 14px 28px;
display: inline-block;
margin-bottom: 24px;
font-weight: 600;
color: #153e5a;
}

.profession-title {
font-size: 3rem;
font-weight: 800;
background: linear-gradient(145deg, #103247, #2a6285);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
margin: 20px 0 10px;
}

.description {
font-size: 1.3rem;
color: #1f3a4e;
margin-bottom: 30px;
}

.recommend-list {
text-align: left;
background: #f4f9ff;
padding: 24px 30px;
border-radius: 36px;
margin: 24px 0;

.college-card {

border-left: 5px solid #2b6c9e;

.college-spec {

.restart-btn {

margin-top: 10px;
}

.footer-note {
margin-top: 24px;
color: #6b85a0;
font-size: 0.9rem;
}

.options-grid { grid-template-columns: 1fr; }
.question { font-size: 1.4rem; }

{ text: "Плавание, лёгкая атлетика — для ясности ума", weights: { SCIENCE: 1, SOCIAL: 1 } },
{ text: "Танцы, театральная студия, фотокросс", weights: { CREATIVE: 3, SOCIAL: 1 } },
{ text: "Командные игры (футбол, волейбол), организация турниров", weights: { SOCIAL: 3, BUSINESS: 2 } }
]
},
{
text: "Кем из известных личностей ты восхищаешься больше?",
options: [
{ text: "Илон Маск, Стив Джобс, Сергей Королёв", weights: { TECH: 3, BUSINESS: 1 } },
{ text: "Мария Склодовская-Кюри, Дмитрий Менделеев", weights: { SCIENCE: 3 } },
{ text: "Фёдор Достоевский, Пабло Пикассо, Андрей Тарковский", weights: { CREATIVE: 3, HUMAN: 2 } },
{ text: "Мать Тереза, Мартин Лютер Кинг, известные психологи", weights: { SOCIAL: 3, HUMAN: 1 } }
]
},
{
text: "Что для тебя важнее в будущей работе?",
options: [
{ text: "Чёткие задачи, стабильность, возможность создавать руками/кодом", weights: { TECH: 2, SCIENCE: 1 } },
{ text: "Постоянное обучение, исследования, открытия", weights: { SCIENCE: 3 } },
{ text: "Свобода самовыражения, нестандартный график", weights: { CREATIVE: 3, HUMAN: 1 } },
{ text: "Общение с разными людьми, карьерный рост, доход", weights: { BUSINESS: 3, SOCIAL: 2 } }
]
}
];

// Рекомендации по профилям
const recommendations = {
TECH: {
title: "👨‍💻 Технический профиль",
description: "Инженер, программист, робототехник, проектировщик.",
details: "Тебе интересно, как всё устроено. Рекомендуем углублённую математику, физику, информатику."
},
SCIENCE: {
title: "🔬 Естественно-научный профиль",
description: "Биолог, химик, врач, эколог, фармацевт.",
details: "Ты любознателен к природе и экспериментам. Подойдут химико-биологические классы, медицинские колледжи."
},
HUMAN: {
title: "📚 Гуманитарный профиль",
description: "Филолог, журналист, юрист, историк, переводчик.",
details: "Тебе близки тексты, языки, культура. Обрати внимание на гуманитарные гимназии, юридические направления."
},
SOCIAL: {
title: "🤝 Социально-педагогический профиль",
description: "Психолог, педагог, социальный работник, HR.",
details: "Ты умеешь находить подход к людям. Рассмотри педагогические колледжи, психологические направления."
},
CREATIVE: {
title: "🎨 Творческий профиль",
description: "Дизайнер, архитектор, музыкант, режиссёр, художник.",
details: "Ты видишь мир в красках и образах. Творческие училища, колледжи искусств — твой путь."
},
BUSINESS: {
title: "📈 Предпринимательский профиль",
description: "Менеджер, маркетолог, экономист, предприниматель.",
details: "Тебе интересно управление и проекты. Рекомендуем социально-экономические классы, бизнес-колледжи."
}
};

// ---------- СОСТОЯНИЕ ----------
let currentStep = 0;
let answers = new Array(questions.length).fill(null);
let scores = {
TECH: 0, SCIENCE: 0, HUMAN: 0, SOCIAL: 0, CREATIVE: 0, BUSINESS: 0
};
let finished = false;
const container = document.getElementById('appContainer');

function calculateScores() {
Object.keys(scores).forEach(k => scores[k] = 0);
for (let qIdx = 0; qIdx < questions.length; qIdx++) {
const answerIdx = answers[qIdx];
if (answerIdx === null) continue;
const weights = questions[qIdx].options[answerIdx].weights;
for (let cat in weights) {
if (scores.hasOwnProperty(cat)) {
scores[cat] += weights[cat];
}
}
}
}

function getTopCategory() {
let maxScore = -1;
let topCat = 'TECH';
for (let cat in scores) {
if (scores[cat] > maxScore) {
maxScore = scores[cat];
topCat = cat;
}
}
return topCat;
}

function allQuestionsAnswered() {
return answers.every(idx => idx !== null);
}

function render() {
if (finished) {
renderResultScreen();
return;
}
if (allQuestionsAnswered()) {
finished = true;
calculateScores();
renderResultScreen();
return;
}
renderQuestionScreen();
}

function renderQuestionScreen() {
const q = questions[currentStep];
const selectedIdx = answers[currentStep];
const progressPercent = ((currentStep) / questions.length) * 100;

let optionsHtml = '';
q.options.forEach((opt, idx) => {
const letter = String.fromCharCode(65 + idx);
const selectedClass = (selectedIdx === idx) ? 'selected' : '';
optionsHtml += `<div class="option-btn ${selectedClass}" data-option-index="${idx}"><span class="prefix">${letter}</span> ${opt.text}</div>`;
});

const isFirst = currentStep === 0;
const isLast = currentStep === questions.length - 1;
const nextDisabled = (selectedIdx === null);

container.innerHTML = `
<h1>🔍 ПрофНавигатор 9</h1>
<div class="subhead">Анкетирование (20 вопросов) + колледжи Воронежа</div>
<div class="progress-container">
<div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
<div class="step-indicator"><span>Вопрос ${currentStep+1} из ${questions.length}</span><span>📋 ${Math.round(progressPercent)}%</span></div>
</div>
<div class="question-box">
<div class="question">${q.text}</div>
<div class="options-grid" id="optionsContainer">${optionsHtml}</div>
</div>
<div class="nav-buttons">
<button class="btn" id="prevBtn" ${isFirst ? 'disabled' : ''}>← Назад</button>
<button class="btn btn-primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>${isLast ? 'Завершить 🎯' : 'Далее →'}</button>
</div>
<div class="footer-note">Выбери вариант, который больше всего отражает твои интересы</div>
`;

document.querySelectorAll('.option-btn').forEach(btn => {
btn.addEventListener('click', () => {
answers[currentStep] = parseInt(btn.dataset.optionIndex);
render();
});
});
document.getElementById('prevBtn')?.addEventListener('click', () => { currentStep--; render(); });
document.getElementById('nextBtn')?.addEventListener('click', () => {
if (selectedIdx !== null) {
if (currentStep < questions.length - 1) { currentStep++; render(); }
else { if (allQuestionsAnswered()) { finished = true; calculateScores(); render(); } }
}
});
}

function renderResultScreen() {
calculateScores();
const topCat = getTopCategory();
const rec = recommendations[topCat];
const colleges = collegesDatabase[topCat] || collegesDatabase.TECH;

let collegesHtml = '';
colleges.forEach(c => {
collegesHtml += `<div class="college-card"><div class="college-name">${c.name}</div><div class="college-spec">${c.specs}</div><div style="font-size:0.9rem; color:#5a7a9a;">${c.note}</div></div>`;
});

const scoreRows = Object.entries(scores)
.map(([cat, val]) => `<span style="display:inline-block; margin:5px 10px;"><strong>${categories[cat]}:</strong> ${val}</span>`).join('');

container.innerHTML = `
<div class="result-screen">
<div class="result-badge">✨ Твой профиль ✨</div>
<div class="profession-title">${rec.title}</div>
<div class="description">${rec.description}</div>
<div class="recommend-list">
<h3 style="margin-bottom: 16px; font-weight: 600;">📌 Рекомендации</h3>
<p style="font-size: 1.2rem; margin-bottom: 20px;">${rec.details}</p>

<h3 style="margin: 24px 0 16px; font-weight: 600;">🏫 Колледжи Воронежа для твоего профиля</h3>
${collegesHtml}

<div style="background: #ffffffb0; border-radius: 30px; padding: 16px; margin-top: 20px;">
<p style="font-weight:500;">🧮 Баллы по направлениям:</p>
<div>${scoreRows}</div>
</div>
<p style="margin-top: 22px; font-style: italic;">Помни: это ориентир. Уточняй условия поступления на сайтах колледжей!</p>
</div>
<button class="btn restart-btn" id="restartBtn">🔄 Пройти анкету заново</button>
<div class="footer-note">Анкета для учащихся 9 класса · Профориентация 2026</div>
</div>
`;
document.getElementById('restartBtn').addEventListener('click', () => {
currentStep = 0;
answers = new Array(questions.length).fill(null);
finished = false;
Object.keys(scores).forEach(k => scores[k] = 0);
render();
});
}

render();
})();
</script>
</body>
</html>
